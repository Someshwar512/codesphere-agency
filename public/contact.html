<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Codesphere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:#0b0f1a;
color:#fff;
}

header{
background:#050816;
padding:15px;
display:flex;
justify-content:space-between;
}

header a{
color:#cbd5f5;
text-decoration:none;
margin-left:15px;
}

.section{
max-width:1100px;
margin:auto;
padding:80px 20px;
text-align:center;
}

h2{
font-size:32px;
margin-bottom:10px;
}

p{
color:#cbd5f5;
margin-bottom:30px;
}

/* GRID INFO */
.info{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.info-box{
background:#111827;
padding:20px;
border-radius:10px;
border:1px solid #1f2937;
}

/* FORM */
form{
max-width:600px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:flex;
gap:10px;
}

input,textarea{
padding:12px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
width:100%;
}

textarea{
height:120px;
}

.btn{
background:#2563eb;
padding:12px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.success{
display:none;
color:#22c55e;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div><b>Codesphere</b></div>
<div>
<a href="index.html">Home</a>
</div>
</header>

<section class="section">

<h2>Contact Us</h2>
<p>Let’s build your project together 🚀</p>

<!-- INFO -->
<div class="info">
<div class="info-box">📧 Email: contact@codesphere.com</div>
<div class="info-box">📞 Phone: +91 7028079359</div>
<div class="info-box">🌍 Location: India</div>
</div>

<!-- FORM -->
<form id="form">

<div class="row">
<input name="fname" placeholder="First Name" required>
<input name="lname" placeholder="Last Name" required>
</div>

<div class="row">
<input name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone">
</div>

<textarea name="message" placeholder="Project Details" required></textarea>

<button type="submit" class="btn">Send Message</button>

<div class="success" id="msg">✅ Message Sent Successfully</div>

</form>

</section>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    fname: this.fname.value,
    lname: this.lname.value,
    email: this.email.value,
    phone: this.phone.value,
    message: this.message.value
  };

  const res = await fetch("/contact", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.text();

  console.log("Server:", result);

  if(result === "success"){
    document.getElementById("msg").style.display = "block";
    this.reset();
  } else {
    alert("Data not saved");
  }
});

</script>

</body>
</html>
