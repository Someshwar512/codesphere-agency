<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- VERY IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starter Plan - Codesphere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#070b1a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

/* MAIN BOX */
.box{
  width:100%;
  max-width:800px;
  background:#111827;
  padding:40px 30px;
  border-radius:15px;
  text-align:center;
  border:1px solid #1f2937;
}

/* TITLE */
h1{
  font-size:32px;
  margin-bottom:10px;
}

/* SUB TEXT */
p{
  color:#cbd5f5;
  margin:8px 0;
}

/* LIST */
.features{
  margin:20px 0;
  text-align:left;
}

.features p{
  padding:6px 0;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  background:#2563eb;
  color:#fff;
  padding:12px 25px;
  border-radius:8px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  background:#1d4ed8;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .box{
    padding:25px 20px;
  }

  h1{
    font-size:24px;
  }

  p{
    font-size:14px;
  }
}

/* EXTRA SMALL */
@media(max-width:480px){

  h1{
    font-size:20px;
  }

  .btn{
    width:100%;
    text-align:center;
  }
}

</style>
</head>

<body>

<div class="box">

<h1>Starter Plan - $199</h1>
<p>Perfect for small business & portfolio</p>

<div class="features">
  <p>✔ 1-3 Pages Website</p>
  <p>✔ Mobile Responsive</p>
  <p>✔ Contact Form</p>
  <p>✔ Basic SEO Setup</p>
  <p>✔ 3 Days Delivery</p>
  <p>✔ Unlimited Revisions</p>
<p>✔ Custom Domain Support</p>
<p>✔ 1 Year Maintenance</p>
</div>

<a href="contact.html" class="btn">Start Project</a>
 <br>
 <br>
  <a href="index.html" class="back">⬅ Back to Home</a>
</div>

</body>
</html>
