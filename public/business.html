<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Plan - Codesphere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#070b1a;
  color:#fff;
  padding:20px;
}

/* CONTAINER */
.box{
  max-width:800px;
  margin:auto;
  background:#111827;
  padding:40px 30px;
  border-radius:16px;
  text-align:center;
  border:1px solid #1f2937;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* TITLE */
h1{
  font-size:32px;
  margin-bottom:10px;
}

.subtitle{
  color:#9ca3af;
  margin-bottom:25px;
}

/* FEATURES */
.features{
  text-align:left;
  margin-top:20px;
}

.features p{
  margin:10px 0;
  padding-left:10px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 25px;
  background:#2563eb;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#1d4ed8;
  transform:scale(1.05);
}

/* BACK BUTTON */
.back{
  display:inline-block;
  margin-top:15px;
  color:#9ca3af;
  text-decoration:none;
  font-size:14px;
}

.back:hover{
  color:#60a5fa;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .box{
    padding:25px 20px;
  }

  h1{
    font-size:24px;
  }

  .subtitle{
    font-size:14px;
  }

  .features p{
    font-size:14px;
  }
}

@media(max-width:480px){

  body{
    padding:15px;
  }

  .btn{
    width:100%;
    text-align:center;
  }

  h1{
    font-size:20px;
  }
}

</style>
</head>

<body>

<div class="box">

  <h1>Business Plan - $299</h1>
  <p class="subtitle">Best for growing business</p>

  <h3>Includes:</h3>

  <div class="features">
    <p>✔ 5-8 Pages Website</p>
    <p>✔ Premium UI/UX Design</p>
    <p>✔ SEO Optimization</p>
    <p>✔ Speed Optimization</p>
    <p>✔ Admin Panel</p>
    <p>✔ 5 Days Delivery</p>
  </div>

  <a href="contact.html" class="btn">Start Project</a>
  <br>
  <a href="index.html" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
