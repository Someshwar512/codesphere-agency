<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Plan - Codesphere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#070b1a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

/* MAIN BOX */
.box{
  width:100%;
  max-width:850px;
  background:linear-gradient(145deg,#111827,#0b1020);
  padding:45px 35px;
  border-radius:18px;
  text-align:center;
  border:1px solid #1f2937;
  box-shadow:0 15px 50px rgba(0,0,0,0.4);
}

/* TITLE */
h1{
  font-size:34px;
  margin-bottom:10px;
}

/* TAGLINE */
.subtitle{
  color:#cbd5f5;
  margin-bottom:20px;
}

/* PRICE BADGE */
.price{
  font-size:38px;
  color:#60a5fa;
  margin-bottom:20px;
}

/* FEATURE LIST */
.features{
  margin:20px 0;
  text-align:left;
}

.features p{
  padding:8px 0;
  border-bottom:1px solid #1f2937;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:25px;
  background:#2563eb;
  color:#fff;
  padding:14px 30px;
  border-radius:10px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  background:#1d4ed8;
}

/* BADGE */
.badge{
  display:inline-block;
  background:#9333ea;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:10px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .box{
    padding:30px 20px;
  }

  h1{
    font-size:26px;
  }

  .price{
    font-size:30px;
  }

  .features p{
    font-size:14px;
  }
}

/* EXTRA SMALL */

@media(max-width:480px){

  h1{
    font-size:22px;
  }

  .btn{
    width:100%;
    text-align:center;
  }
}

</style>
</head>

<body>

<div class="box">

<span class="badge">🔥 Most Powerful Plan</span>

<h1>Premium Plan</h1>
<div class="price">$499</div>

<p class="subtitle">Best for startups & ecommerce businesses</p>

<div class="features">
  <p>✔ Full Website / Web App</p>
  <p>✔ Ecommerce System</p>
  <p>✔ Payment Integration</p>
  <p>✔ Custom Features</p>
  <p>✔ Advanced SEO</p>
  <p>✔ 15 Days Delivery</p>
</div>

<a href="contact.html" class="btn">Start Project</a>
 <br>
 <br>
  <a href="index.html" class="back">⬅ Back to Home</a>
</div>


</body>
</html>
